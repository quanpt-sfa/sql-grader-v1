          TenNhanVien: [TenNV, EmployeeName]

views:
  mode: answer_snapshot
  execution_mode: compare_existing_data
  export_outputs: true
  compare_as_multiset: true
  expected:
    - answer_view: "Cau1"
      answer_required: true
      student_required: true
      check_mode: "full"
      order_sensitive: false
      expected_output:
        columns:
          - canonical: "TenNhaCungCap"
            type: "text"
            aliases: ["Tên nhà cung cấp", "TenNhaCungCap", "TenNCC", "Tên NCC"]
          - canonical: "DiaChi"
            type: "text"
            aliases: ["Địa chỉ", "DiaChi"]
          - canonical: "KhuVuc"
            type: "text"
            aliases: ["Khu vực", "Khu Vực", "KhuVuc"]
        sort_by: ["TenNhaCungCap"]
        numeric_tolerance: 0.01

    - answer_view: "Cau2"
      answer_required: true
      student_required: true
